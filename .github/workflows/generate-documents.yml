name: Generate Documents (PDF + DOCX)

# Generates PDF and DOCX versions of all substantive AIWA documents.
#
# Triggers:
#   • Push to main — when any tracked document or this workflow changes.
#   • Release published — builds everything and attaches files to the release.
#   • workflow_dispatch — manual trigger; always builds everything.
#
# Outputs:
#   • GitHub Actions artifacts (90-day retention) for every run.
#   • "documents-latest" prerelease assets for push/workflow_dispatch runs.
#   • Files attached to GitHub Releases when a release is published.

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**/*.md'
      - 'forms/**/*.md'
      - 'policies/**/*.md'
      - 'governance/**/*.md'
      - 'programs/**/*.md'
      - 'templates/**/*.md'
      - '.github/workflows/generate-documents.yml'
      - '.github/scripts/build-documents.sh'
      - 'templates/reference/reference.docx'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Documents
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Source
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Toolchain — Pandoc + XeLaTeX
      # ------------------------------------------------------------------ #
      - name: Install Pandoc and XeLaTeX packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            lmodern \
            fonts-liberation

      - name: Verify Pandoc and XeLaTeX installation
        run: |
          pandoc --version
          xelatex --version

      # ------------------------------------------------------------------ #
      # 3. Optional Eisvogel PDF template (better PDF styling)
      #    Falls back to Pandoc default if unavailable.
      # ------------------------------------------------------------------ #
      - name: Install Eisvogel PDF template
        continue-on-error: true
        run: |
          EISVOGEL_URL="https://github.com/Wandmalfarbe/pandoc-latex-template/releases/download/v2.5.0/Eisvogel-2.5.0.tar.gz"
          EISVOGEL_ARCHIVE="/tmp/eisvogel.tar.gz"
          EISVOGEL_SHA256="e21a3780d4d23f5d5c8e4653a1d3e33bebe190b7fd5000bd7c9fed2121dac32a"

          wget -q "$EISVOGEL_URL" -O "$EISVOGEL_ARCHIVE"
          printf '%s  %s\n' "$EISVOGEL_SHA256" "$EISVOGEL_ARCHIVE" | sha256sum --check --status
          tar -xf "$EISVOGEL_ARCHIVE" eisvogel.latex
          mkdir -p "$HOME/.local/share/pandoc/templates"
          mv eisvogel.latex "$HOME/.local/share/pandoc/templates/"
          echo "Eisvogel installed ✓"

      # ------------------------------------------------------------------ #
      # 4. Build
      # ------------------------------------------------------------------ #
      - name: Build all documents
        run: bash .github/scripts/build-documents.sh

      # ------------------------------------------------------------------ #
      # 5. Upload artifacts (90-day retention)
      # ------------------------------------------------------------------ #
      - name: Upload PDF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiwa-documents-pdf-${{ github.run_number }}
          path: dist/**/*.pdf
          retention-days: 90
          if-no-files-found: warn

      - name: Upload DOCX artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiwa-documents-docx-${{ github.run_number }}
          path: dist/**/*.docx
          retention-days: 90
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiwa-documents-logs-${{ github.run_number }}
          path: dist/**/*.log
          retention-days: 90
          if-no-files-found: warn

      # ------------------------------------------------------------------ #
      # 6. Job summary
      # ------------------------------------------------------------------ #
      - name: Build summary
        if: always()
        run: |
          echo "## 📄 AIWA Document Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`${{ github.event_name }}\`  " >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Document | PDF | DOCX |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|:---:|:----:|" >> "$GITHUB_STEP_SUMMARY"
          find dist -name "*.pdf" 2>/dev/null | sort | while read -r pdf; do
            docx="${pdf%.pdf}.docx"
            source="${pdf#dist/}"
            source="${source%.pdf}.md"
            pdf_mark="✅"
            docx_mark="$([ -f "$docx" ] && echo "✅" || echo "❌")"
            echo "| \`$source\` | $pdf_mark | $docx_mark |" >> "$GITHUB_STEP_SUMMARY"
          done

  release-upload:
    name: Attach documents to GitHub Release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download document artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aiwa-documents-*-${{ github.run_number }}
          merge-multiple: true
          path: dist

      - name: Attach documents to release
        run: |
          echo "Attaching files to release: ${{ github.event.release.tag_name }}"
          find dist -type f \( -name "*.pdf" -o -name "*.docx" \) | sort | \
            xargs -I{} gh release upload "${{ github.event.release.tag_name }}" {} --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  latest-release-upload:
    name: Publish latest documents prerelease assets
    if: github.event_name != 'release'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download document artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aiwa-documents-*-${{ github.run_number }}
          merge-multiple: true
          path: dist

      - name: Create or update latest documents prerelease
        run: |
          set -euo pipefail

          TAG_NAME="documents-latest"
          RELEASE_TITLE="Latest AIWA Generated Documents"
          NOTES_FILE="$(mktemp)"

          cat >"$NOTES_FILE" <<EOF
          Auto-updated document bundle from \`${{ github.sha }}\`.

          Source run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Generated on: $(date -u +"%Y-%m-%d %H:%M:%SZ")
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --prerelease
          else
            gh release create "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --prerelease
          fi

          find dist -type f \( -name "*.pdf" -o -name "*.docx" \) | sort | \
            xargs -I{} gh release upload "$TAG_NAME" {} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
